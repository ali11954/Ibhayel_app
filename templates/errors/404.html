<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الصفحة غير موجودة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-card { text-align: center; padding: 3rem; background: white; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); max-width: 500px; }
        .error-code { font-size: 8rem; font-weight: 800; background: linear-gradient(135deg, #16a34a, #22c55e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
        .error-icon { font-size: 4rem; color: #22c55e; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon"><i class="fas fa-leaf"></i></div>
        <div class="error-code">404</div>
        <h2 class="mt-3 mb-2" style="color: #166534;">الصفحة غير موجودة</h2>
        <p class="text-muted mb-4">عذراً، الصفحة التي تبحث عنها غير موجودة أو تم نقلها.</p>
        <a href="/" class="btn btn-success btn-lg px-4" style="background: linear-gradient(135deg, #16a34a, #15803d); border: none;">
            <i class="fas fa-home me-2"></i> العودة للرئيسية
        </a>
    </div>
</body>
</html>
