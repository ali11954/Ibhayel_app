<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - خطأ في الخادم</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-card { text-align: center; padding: 3rem; background: white; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); max-width: 500px; }
        .error-code { font-size: 8rem; font-weight: 800; background: linear-gradient(135deg, #dc2626, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
        .error-icon { font-size: 4rem; color: #ef4444; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon"><i class="fas fa-exclamation-triangle"></i></div>
        <div class="error-code">500</div>
        <h2 class="mt-3 mb-2" style="color: #991b1b;">خطأ في الخادم</h2>
        <p class="text-muted mb-4">عذراً، حدث خطأ داخلي. يرجى المحاولة مرة أخرى لاحقاً.</p>
        <a href="/" class="btn btn-danger btn-lg px-4" style="background: linear-gradient(135deg, #dc2626, #b91c1c); border: none; color: white;">
            <i class="fas fa-home me-2"></i> العودة للرئيسية
        </a>
    </div>
</body>
</html>
