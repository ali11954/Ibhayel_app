{% extends "base.html" %}

{% block title %}{{ 'تعديل شركة' if company else 'إضافة شركة جديدة' }} - ابن هائل{% endblock %}

{% block content %}
<div class="page-header">
    <h2>
        <i class="fas fa-building"></i>
        {{ 'تعديل شركة' if company else 'إضافة شركة جديدة' }}
    </h2>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">اسم الشركة <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control" required
                               value="{{ company.name if company else '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">جهة الاتصال</label>
                        <input type="text" name="contact_person" class="form-control"
                               value="{{ company.contact_person if company else '' }}">
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">رقم الهاتف</label>
                            <input type="tel" name="phone" class="form-control"
                                   value="{{ company.phone if company else '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">البريد الإلكتروني</label>
                            <input type="email" name="email" class="form-control"
                                   value="{{ company.email if company else '' }}">
                        </div>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('companies_dashboard') }}" class="btn btn-secondary">إلغاء</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> حفظ
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
