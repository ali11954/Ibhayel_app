{% extends "base.html" %}

{% block title %}تعديل حساب{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="card">
                <div class="card-header bg-warning">
                    <h4><i class="fas fa-edit"></i> تعديل حساب: {{ account.code }} - {{ account.name_ar }}</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">رقم الحساب *</label>
                                <input type="text" name="code" class="form-control" required value="{{ account.code }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">الاسم (إنجليزي) *</label>
                                <input type="text" name="name" class="form-control" required value="{{ account.name }}">
                            </div>
                            <div class="col-md-12 mb-3">
                                <label class="form-label">الاسم (عربي) *</label>
                                <input type="text" name="name_ar" class="form-control" required value="{{ account.name_ar }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">نوع الحساب *</label>
                                <select name="account_type" class="form-select" required>
                                    {% for key, value in account_types.items() %}
                                    <option value="{{ key }}" {% if account.account_type == key %}selected{% endif %}>
                                        {{ value }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">الطبيعة *</label>
                                <select name="nature" class="form-select" required>
                                    {% for key, value in natures.items() %}
                                    <option value="{{ key }}" {% if account.nature == key %}selected{% endif %}>
                                        {{ value }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-12 mb-3">
                                <label class="form-label">الحساب الأب</label>
                                <select name="parent_id" class="form-select">
                                    <option value="">-- لا يوجد (حساب رئيسي) --</option>
                                    {% for acc in parent_accounts %}
                                    <option value="{{ acc.id }}" {% if account.parent_id == acc.id %}selected{% endif %}>
                                        {{ acc.code }} - {{ acc.name_ar }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">الرصيد الافتتاحي</label>
                                <input type="number" name="opening_balance" class="form-control" step="0.01"
                                       value="{{ account.opening_balance }}">
                                <small class="text-warning">⚠️ تغيير الرصيد الافتتاحي يؤثر على الميزانية</small>
                            </div>
                            <div class="col-md-12 mb-3">
                                <label class="form-label">ملاحظات</label>
                                <textarea name="notes" class="form-control" rows="2">{{ account.notes or '' }}</textarea>
                            </div>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('chart_of_accounts') }}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> إلغاء
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> حفظ التغييرات
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
