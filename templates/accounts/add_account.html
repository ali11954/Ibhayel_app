{% extends "base.html" %}

{% block title %}إضافة حساب جديد{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h4><i class="fas fa-plus"></i> إضافة حساب جديد</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">رقم الحساب *</label>
                                <input type="text" name="code" class="form-control" required
                                       placeholder="مثال: 140001">
                                <small class="text-muted">رقم فريد للحساب (6 أرقام)</small>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">الاسم (إنجليزي) *</label>
                                <input type="text" name="name" class="form-control" required>
                            </div>
                            <div class="col-md-12 mb-3">
                                <label class="form-label">الاسم (عربي) *</label>
                                <input type="text" name="name_ar" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">نوع الحساب *</label>
                                <select name="account_type" class="form-select" required>
                                    <option value="">اختر النوع</option>
                                    {% for key, value in account_types.items() %}
                                    <option value="{{ key }}">{{ value }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">الطبيعة *</label>
                                <select name="nature" class="form-select" required>
                                    <option value="">اختر الطبيعة</option>
                                    {% for key, value in natures.items() %}
                                    <option value="{{ key }}">{{ value }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-12 mb-3">
                                <label class="form-label">الحساب الأب</label>
                                <select name="parent_id" class="form-select">
                                    <option value="">-- لا يوجد (حساب رئيسي) --</option>
                                    {% for acc in parent_accounts %}
                                    <option value="{{ acc.id }}">{{ acc.code }} - {{ acc.name_ar }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">الرصيد الافتتاحي</label>
                                <input type="number" name="opening_balance" class="form-control" step="0.01" value="0">
                            </div>
                            <div class="col-md-12 mb-3">
                                <label class="form-label">ملاحظات</label>
                                <textarea name="notes" class="form-control" rows="2"></textarea>
                            </div>
                        </div>
                        <div class="alert alert-info">
                            <i class="fas fa-info-circle"></i>
                            <strong>تنبيه:</strong> الحسابات التي لها معاملات لا يمكن حذفها.
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('chart_of_accounts') }}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> إلغاء
                            </a>
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-save"></i> حفظ الحساب
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
