{% extends "base.html" %}

{% block title %}تعديل فئة مصروفات{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-md-6 mx-auto">
            <div class="card">
                <div class="card-header bg-warning">
                    <h4><i class="fas fa-edit"></i> تعديل فئة مصروفات</h4>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">الاسم (إنجليزي) *</label>
                            <input type="text" name="name" class="form-control" value="{{ category.name }}" required>
                            <small class="text-muted">مثال: utilities, rent, office</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">الاسم (عربي) *</label>
                            <input type="text" name="name_ar" class="form-control" value="{{ category.name_ar }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">رقم الحساب المحاسبي</label>
                            <input type="text" name="account_code" class="form-control" value="{{ category.account_code or '' }}" placeholder="مثال: 530001">
                            <small class="text-muted">اتركه فارغاً لاستخدام الحساب الافتراضي (590001)</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">الفئة الأب (اختياري)</label>
                            <select name="parent_id" class="form-select">
                                <option value="">-- لا يوجد --</option>
                                {% for cat in categories %}
                                <option value="{{ cat.id }}" {% if category.parent_id == cat.id %}selected{% endif %}>
                                    {{ cat.name_ar }} ({{ cat.name }})
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('expense_categories_list') }}" class="btn btn-secondary">
                                <i class="fas fa-times"></i> إلغاء
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> حفظ التغييرات
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
