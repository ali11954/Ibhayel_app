services:
  - type: web
    name: ibn-hayel-system
    runtime: python
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        value: postgresql://postgres.jpuockjpxpvrlewvzahy:ali1993mubark@aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres
